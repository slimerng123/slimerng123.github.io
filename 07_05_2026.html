<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upgrade Tree</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0c10;--surface:#13151c;--border:#252836;--border2:#333650;--text:#dde1f0;--accent2:#7eb3ff;--gold:#f5c842;--gold-bg:#2a1f00;--gold-bd:#5a3f00;--purple:#a78bfa;--purple-bg:#1a0d2e;--purple-bd:#4c1d95;--font-ui:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui);cursor:grab;}
body.dragging{cursor:grabbing;}
#viewport{width:100%;height:100%;position:relative;overflow:hidden;background:var(--bg);background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:24px 24px;}
#scene{position:absolute;top:0;left:0;transform-origin:0 0;}
#img-wrapper{position:relative;display:inline-block;line-height:0;user-select:none;}
#tree-img{display:block;max-width:none;pointer-events:none;user-select:none;-webkit-user-drag:none;}
.bg-overlay{position:absolute;pointer-events:none;}
.bg-overlay img{display:block;width:100%;height:100%;object-fit:fill;pointer-events:none;}
/* All nodes are invisible hitboxes — transparent by default */
.hnode{position:absolute;transform:translate(-50%,-50%);cursor:pointer;pointer-events:all;z-index:10;}
.hnode svg{display:block;}
.hnode polygon{fill:transparent;stroke:none;}
/* Back button */
#back-btn{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;padding:7px 18px;font-size:13px;font-weight:700;background:var(--purple-bg);border:1.5px solid var(--purple);color:var(--purple);border-radius:20px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.6);letter-spacing:0.04em;font-family:var(--font-ui);}
#back-btn:hover{background:#2a1040;}
/* Tooltip */
#tooltip{position:fixed;z-index:9999;pointer-events:none;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;max-width:230px;display:none;box-shadow:0 6px 28px rgba(0,0,0,0.7);}
.tip-name{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:5px;}
.tip-cost{display:inline-flex;align-items:center;gap:5px;background:var(--gold-bg);border:1px solid var(--gold-bd);color:var(--gold);font-family:var(--font-mono);font-size:12px;font-weight:600;border-radius:5px;padding:3px 9px;margin-bottom:7px;}
.tip-cost::before{content:'◈';font-size:10px;}
.tip-desc{font-size:12px;color:#7a82a8;line-height:1.6;}
</style>
</head>
<body>
<div id="viewport"><div id="scene"><div id="img-wrapper"><img id="tree-img" alt="Upgrade Tree"></div></div></div>
<button id="back-btn">← Back to Main Tree</button>
<div id="tooltip"><div class="tip-name" id="t-name"></div><div class="tip-cost" id="t-cost"></div><div class="tip-desc" id="t-desc"></div></div>

const overlaysData=[{"src":"https://i.imgur.com/83WNUaT.png","x":1120,"y":887,"w":548,"h":395,"naturalW":970,"naturalH":700,"locked":true,"special":true,"linkedNodeIdx":12},{"src":"https://files.catbox.moe/dy3i8y.png","x":-516.2657893231421,"y":-929.106235302201,"w":3211,"h":3211,"naturalW":3000,"naturalH":3000,"locked":true,"special":true,"linkedNodeIdx":64},{"src":"https://files.catbox.moe/dgsfw3.png","x":-526.0902696538972,"y":-790.322516057189,"w":3013,"h":3013,"naturalW":3000,"naturalH":3000,"locked":true}];
const IMG_SRC="https://i.imgur.com/hVSZZjG.png";

const scene=document.getElementById('scene');
const imgWrapper=document.getElementById('img-wrapper');
const treeImg=document.getElementById('tree-img');
const tooltip=document.getElementById('tooltip');
const backBtn=document.getElementById('back-btn');

let activeSpecialOverlay=null;

// ── PAN & ZOOM ──
let panX=0,panY=0,scale=1,isPanning=false,hasPanned=false,panStartX=0,panStartY=0,panOriginX=0,panOriginY=0;
const MIN_SCALE=0.1,MAX_SCALE=4;
function applyTransform(){scene.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;}
document.addEventListener('mousedown',e=>{isPanning=true;hasPanned=false;panStartX=e.clientX;panStartY=e.clientY;panOriginX=panX;panOriginY=panY;document.body.classList.add('dragging');});
document.addEventListener('mousemove',e=>{if(!isPanning)return;const dx=e.clientX-panStartX,dy=e.clientY-panStartY;if(!hasPanned&&Math.abs(dx)<3&&Math.abs(dy)<3)return;hasPanned=true;panX=panOriginX+dx;panY=panOriginY+dy;applyTransform();});
document.addEventListener('mouseup',()=>{isPanning=false;setTimeout(()=>{hasPanned=false;},50);document.body.classList.remove('dragging');});
document.getElementById('viewport').addEventListener('wheel',e=>{e.preventDefault();const factor=e.deltaY<0?1.1:0.9;const newScale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,scale*factor));const rect=document.getElementById('viewport').getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;panX=mx-(mx-panX)*(newScale/scale);panY=my-(my-panY)*(newScale/scale);scale=newScale;applyTransform();},{passive:false});

// ── HEX POINTS ──
function hexPoints(r){const s=r/18;return[[11.2*s,5.2*s],[25.8*s,5.2*s],[32.7*s,17.4*s],[25.8*s,30.4*s],[10.9*s,30.8*s],[3.3*s,17.4*s]].map(p=>p.join(',')).join(' ');}

// ── SHOW TOOLTIP ──
function showTooltip(n,e){
  if(!n.name&&!n.cost&&!n.desc)return;
  document.getElementById('t-name').textContent=n.name||'';
  const costEl=document.getElementById('t-cost');
  costEl.textContent=n.cost||'';
  costEl.style.display=n.cost?'inline-flex':'none';
  const descEl=document.getElementById('t-desc');
  descEl.textContent=n.desc||'';
  descEl.style.display=n.desc?'block':'none';
  tooltip.style.display='block';
  positionTooltip(e);
}
function positionTooltip(e){const x=e.clientX+14,y=e.clientY+14;tooltip.style.left=(x+235>window.innerWidth?e.clientX-245:x)+'px';tooltip.style.top=(y+150>window.innerHeight?e.clientY-160:y)+'px';}

// ── RENDER ──
function render(){
  // Manage main tree image visibility
  treeImg.style.visibility=activeSpecialOverlay!==null?'hidden':'visible';
  // Back button
  backBtn.style.display=activeSpecialOverlay!==null?'block':'none';

  // Render overlays
  document.querySelectorAll('.bg-overlay').forEach(e=>e.remove());
  overlaysData.forEach((ov,i)=>{
    // Skip special overlays that aren't active; skip normal overlays when a special is active
    if(ov.special){
      if(activeSpecialOverlay!==i)return;
    } else {
      if(activeSpecialOverlay!==null)return;
    }
    const d=document.createElement('div');
    d.className='bg-overlay';
    d.style.cssText=`left:${ov.x}px;top:${ov.y}px;width:${ov.w}px;height:${ov.h}px;z-index:2;`;
    const img=document.createElement('img');
    img.src=ov.src;
    img.setAttribute('draggable','false');
    d.appendChild(img);
    imgWrapper.appendChild(d);
  });

  // Render nodes
  document.querySelectorAll('.hnode').forEach(e=>e.remove());
  const iw=treeImg.offsetWidth,ih=treeImg.offsetHeight,r=HEX_R;
  nodes.forEach((n,i)=>{
    const nodeOverlay=(n.overlayIdx!==undefined&&n.overlayIdx!==null&&n.overlayIdx!=='')?+n.overlayIdx:null;
    const linkedOverlayIdx=overlaysData.findIndex(ov=>ov.special&&ov.linkedNodeIdx===i);
    const isActiveOverlayTrigger=linkedOverlayIdx!==-1&&linkedOverlayIdx===activeSpecialOverlay;

    if(activeSpecialOverlay!==null){
      // Special overlay active: show only its assigned nodes + its own trigger
      if(!isActiveOverlayTrigger&&nodeOverlay!==activeSpecialOverlay)return;
    } else {
      // Normal view: show main-tree nodes only (no overlay assignment)
      if(nodeOverlay!==null)return;
    }

    const isTrigger=linkedOverlayIdx!==-1;
    const dx=n.px/100*iw,dy=n.py/100*ih;
    const el=document.createElement('div');
    // All nodes are fully invisible — transparent hitboxes only
    el.className='hnode';
    el.style.cssText=`position:absolute;left:${dx}px;top:${dy}px;width:${r*2}px;height:${r*2}px;`;
    el.innerHTML=`<svg width="${r*2}" height="${r*2}" viewBox="0 0 ${r*2} ${r*2}" style="display:block"><polygon points="${hexPoints(r)}" style="fill:transparent;stroke:none;"/></svg>`;

    // Tooltip for all nodes that have content
    if(n.name||n.cost||n.desc){
      el.addEventListener('mouseenter',e2=>showTooltip(n,e2));
      el.addEventListener('mousemove',e2=>positionTooltip(e2));
      el.addEventListener('mouseleave',()=>{tooltip.style.display='none';});
    }

    // Click handler
    el.addEventListener('click',e2=>{
      e2.stopPropagation();
      tooltip.style.display='none';
      if(isTrigger){
        if(hasPanned)return;
        activeSpecialOverlay=activeSpecialOverlay===linkedOverlayIdx?null:linkedOverlayIdx;
        render();
      }
    });

    imgWrapper.appendChild(el);
  });
}

// Back button
backBtn.addEventListener('click',()=>{activeSpecialOverlay=null;render();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&activeSpecialOverlay!==null){activeSpecialOverlay=null;render();}});

// Boot
treeImg.addEventListener('dragstart',e=>e.preventDefault());
treeImg.src=IMG_SRC;
treeImg.onload=()=>{
  const vw=window.innerWidth,vh=window.innerHeight,iw=treeImg.naturalWidth,ih=treeImg.naturalHeight;
  const fitScale=Math.min(vw/iw,vh/ih,1);
  scale=fitScale;panX=(vw-iw*fitScale)/2;panY=(vh-ih*fitScale)/2;
  applyTransform();
  render();
};
</script>
